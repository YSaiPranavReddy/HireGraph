<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 120" width="100%" height="100%">
  <g transform="translate(15, 20)">
    <defs>
      <linearGradient id="glowGray" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#333333" stop-opacity="0.8"/>
        <stop offset="100%" stop-color="#333333" stop-opacity="0.1"/>
      </linearGradient>
      <linearGradient id="glowBlue" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#42a5f5" stop-opacity="0.9"/>
        <stop offset="100%" stop-color="#42a5f5" stop-opacity="0.2"/>
      </linearGradient>
       <linearGradient id="glowCenter" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#80cbc4" stop-opacity="0.6"/>
        <stop offset="100%" stop-color="#42a5f5" stop-opacity="0.4"/>
      </linearGradient>
    </defs>

    <path d="M 20 10 Q 20 40, 20 70" stroke="#333333" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M 70 10 Q 70 40, 70 70" stroke="#42a5f5" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M 20 40 Q 45 40, 70 40" stroke="#888888" stroke-width="5" stroke-linecap="round" fill="none"/>
    
    <circle cx="20" cy="10" r="10" fill="url(#glowGray)" />
    <circle cx="20" cy="70" r="10" fill="url(#glowGray)" />
    <circle cx="70" cy="10" r="10" fill="url(#glowBlue)" />
    <circle cx="70" cy="70" r="10" fill="url(#glowBlue)" />
    
    <circle cx="45" cy="40" r="8" fill="url(#glowCenter)" />

  </g>

  <text x="120" y="75" font-family="'Montserrat', 'Futura', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="700" fill="#333333" letter-spacing="-1.5">Hire</text>
  <text x="218" y="75" font-family="'Montserrat', 'Futura', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="400" fill="#888888" letter-spacing="-1.5">Graph</text>
</svg>